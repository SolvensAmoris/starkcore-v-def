<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STARKCORE // DEFENSE OPERATIONS</title>
<style>
:root{--bg:#080a0a;--line:#1e1e1e;--w:#fff;--dim:#8a8a8a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--w);font-family:JetBrains Mono,monospace,monospace;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:28px 28px;opacity:.22;pointer-events:none}
.wrap{position:relative;max-width:1180px;margin:0 auto;padding:18px 20px}
.nav{display:flex;justify-content:space-between;border-bottom:1px solid #222;padding-bottom:14px;font-size:11px;letter-spacing:2px}
.nav .r{display:flex;gap:22px;color:var(--dim)}
.tags{display:flex;gap:10px;margin:50px 0 22px;flex-wrap:wrap}
.tag{border:1px solid #333;padding:5px 12px;font-size:11px;letter-spacing:1px}
.hero h1{font-size:clamp(32px,5.2vw,56px);line-height
